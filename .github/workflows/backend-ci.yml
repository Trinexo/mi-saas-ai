name: Platform CI

on:
  push:
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plataforma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d plataforma_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/plataforma_test
      JWT_SECRET: change_this_secret_in_ci
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      ALLOW_E2E_WRITES: true
      E2E_DB_ISOLATED: true
      E2E_DATABASE_URL: postgres://postgres:postgres@localhost:5432/plataforma_test
      E2E_API_BASE: http://localhost:3000/api
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema and seed
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/schema.sql
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/seed.sql
          for f in $(ls database/migrations/*.sql | sort); do
            echo "Applying migration: $f"
            psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$f"
          done

      - name: Start backend API
        working-directory: backend
        run: |
          nohup npm run start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/api/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run backend unit tests
        working-directory: backend
        run: npm test

      - name: Run smoke E2E first pass
        working-directory: backend
        run: npm run test:smoke

      - name: Run smoke E2E second pass
        working-directory: backend
        run: npm run test:smoke

      - name: Dump backend log on failure
        if: failure()
        run: |
          echo "===== /tmp/backend.log ====="
          cat /tmp/backend.log || true

      - name: Stop backend API
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  stripe-checkout-webhook-isolated:
    runs-on: ubuntu-latest
    needs:
      - test-backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plataforma_test_stripe_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d plataforma_test_stripe_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/plataforma_test_stripe_e2e
      JWT_SECRET: change_this_secret_in_ci
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      ALLOW_E2E_WRITES: true
      E2E_DB_ISOLATED: true
      ALLOW_STRIPE_E2E: true
      STRIPE_E2E_MODE: mock
      STRIPE_SECRET_KEY: sk_test_mock_only
      STRIPE_WEBHOOK_SECRET: whsec_mock_only
      FRONTEND_URL: http://127.0.0.1:4173
      E2E_API_BASE: http://127.0.0.1:3000/api
      VITE_API_URL: http://127.0.0.1:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema and migrations
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/schema.sql
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/seed.sql
          for f in $(ls database/migrations/*.sql | sort); do
            echo "Applying migration: $f"
            psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$f"
          done

      - name: Run isolated Stripe checkout and webhook first pass
        working-directory: backend
        run: npm run test:stripe

      - name: Run isolated Stripe checkout and webhook second pass
        working-directory: backend
        run: npm run test:stripe

  browser-roles-e2e:
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - build-frontend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plataforma_test_roles_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d plataforma_test_roles_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/plataforma_test_roles_e2e
      JWT_SECRET: change_this_secret_in_ci
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      ALLOW_E2E_WRITES: true
      E2E_DB_ISOLATED: true
      E2E_DATABASE_URL: postgres://postgres:postgres@localhost:5432/plataforma_test_roles_e2e
      E2E_API_BASE: http://127.0.0.1:3000/api
      E2E_ROLE_FIXTURES_READY: true
      FRONTEND_URL: http://127.0.0.1:4173
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
      PORT: 3000
      VITE_API_URL: http://127.0.0.1:3000/api
      ROLE_E2E_ADMIN_EMAIL: e2e_role_admin@test.local
      ROLE_E2E_PROFESOR_EMAIL: e2e_role_profesor@test.local
      ROLE_E2E_ALUMNO_EMAIL: e2e_role_alumno@test.local
      ROLE_E2E_PASSWORD: role-e2e-2026
      ROLE_E2E_OPOSICION_NAME: E2E Role Oposicion BL-021

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema and seed
        run: |
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/schema.sql
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/seed.sql
          for f in $(ls database/migrations/*.sql | sort); do
            echo "Applying migration: $f"
            psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$f"
          done

      - name: Create role E2E fixtures
        working-directory: backend
        run: node tests/e2e/role-fixtures.mjs setup

      - name: Build frontend for isolated API
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend API
        working-directory: backend
        run: |
          nohup npm run start > /tmp/backend-roles-e2e.log 2>&1 &
          echo $! > /tmp/backend-roles-e2e.pid

      - name: Start frontend preview
        working-directory: frontend
        run: |
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/frontend-roles-e2e.log 2>&1 &
          echo $! > /tmp/frontend-roles-e2e.pid

      - name: Wait for local services
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:3000/api/health >/dev/null && curl -sSf http://127.0.0.1:4173/login >/dev/null; then
              echo "Local backend and frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Local services failed to start"
          echo "===== backend ====="
          cat /tmp/backend-roles-e2e.log || true
          echo "===== frontend ====="
          cat /tmp/frontend-roles-e2e.log || true
          exit 1

      - name: Run role browser E2E first pass
        working-directory: frontend
        run: npm run test:e2e:roles

      - name: Run role browser E2E second pass
        working-directory: frontend
        run: npm run test:e2e:roles

      - name: Cleanup role E2E fixtures
        if: always()
        working-directory: backend
        run: node tests/e2e/role-fixtures.mjs cleanup

      - name: Dump local service logs on failure
        if: failure()
        run: |
          echo "===== /tmp/backend-roles-e2e.log ====="
          cat /tmp/backend-roles-e2e.log || true
          echo "===== /tmp/frontend-roles-e2e.log ====="
          cat /tmp/frontend-roles-e2e.log || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-role-e2e-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Stop local services
        if: always()
        run: |
          if [ -f /tmp/frontend-roles-e2e.pid ]; then
            kill "$(cat /tmp/frontend-roles-e2e.pid)" || true
          fi
          if [ -f /tmp/backend-roles-e2e.pid ]; then
            kill "$(cat /tmp/backend-roles-e2e.pid)" || true
          fi
