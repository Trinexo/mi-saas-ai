name: Platform CI

on:
  push:
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: plataforma_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d plataforma_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/plataforma_test
      JWT_SECRET: change_this_secret_in_ci
      JWT_EXPIRES_IN: 7d
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema and seed
        run: |
          psql "$DATABASE_URL" -f database/schema.sql
          psql "$DATABASE_URL" -f database/seed.sql

      - name: Start backend API
        working-directory: backend
        run: |
          nohup npm run start > /tmp/backend.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/api/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run backend unit + smoke tests
        working-directory: backend
        run: npm run test:ci

      - name: Dump backend log on failure
        if: failure()
        run: |
          echo "===== /tmp/backend.log ====="
          cat /tmp/backend.log || true

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
