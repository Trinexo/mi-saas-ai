# Stack de producción autohospedado.

services:
  postgres:
    image: postgres:16-alpine
    container_name: plataforma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plataforma_test}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plataforma_test}"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: plataforma_migrate
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plataforma_test}
      NODE_ENV: production
    command: ["sh", "-c", "node backend/scripts/bootstrap-schema-if-empty.mjs && node backend/scripts/migrate-official.mjs"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: plataforma_backend
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-plataforma_test}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BACKEND_PUBLIC_URL:-http://localhost:3000}/api
    container_name: plataforma_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
