server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml
               application/xml+rss image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Assets con hash → caché permanente (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker: sin caché para garantizar actualizaciones
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest PWA: caché corta (puede cambiar con frecuencia)
    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Favicon e iconos
    location ~* \.(ico|png|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Iconos SVG PWA
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback → todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
